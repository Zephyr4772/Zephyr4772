name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Introduction
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.introduction.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_introduction: yes

      - name: 2. Isometric Commit Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - name: 3. Language Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used

      - name: 4. People (Followers/Following)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.people.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 48
          plugin_people_types: followers, following

      - name: 5. AniList (Favorite Characters)
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.anilist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_anilist: yes
          plugin_anilist_medias: anime
          plugin_anilist_limit: 2
          # REPLACE WITH YOUR ANILIST USERNAME
          plugin_anilist_user: zephyr4772

      - name:  Random Music from Playlist
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.music.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: playlist
          plugin_music_limit: 4
          # Replace with your playlist, e.g., spotify playlist URL
          plugin_music_playlist: https://open.spotify.com/embed/playlist/6M01TYod9yKusiaJTGZ8Q7

      - name: 7. Starred Topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: mastered
          plugin_topics_sort: stars

      - name: 8. Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
